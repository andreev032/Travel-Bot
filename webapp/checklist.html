<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Чеклист для путешествия</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       #111827;
      --surface:  #1f2937;
      --border:   #374151;
      --text:     #f9fafb;
      --muted:    #9ca3af;
      --accent:   #34d399;
      --accent2:  #059669;
      --danger:   #f87171;
      --radius:   14px;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      min-height: 100%; background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text); font-size: 15px;
    }
    body { padding: 0 0 100px; }

    /* ── Header ── */
    #header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }
    #header h1 {
      font-size: 18px; font-weight: 700;
      margin-bottom: 10px;
    }
    #progress-bar-wrap {
      background: var(--border);
      border-radius: 99px; height: 6px; overflow: hidden;
    }
    #progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      transition: width .3s ease;
    }
    #counter {
      margin-top: 8px;
      font-size: 13px; color: var(--muted);
    }
    #counter span { color: var(--accent); font-weight: 600; }

    /* ── Categories ── */
    .category { margin: 16px 12px 0; }
    .cat-header {
      font-size: 13px; font-weight: 600;
      color: var(--muted); letter-spacing: .5px;
      text-transform: uppercase;
      padding: 0 4px 8px;
    }
    .cat-items {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Item row ── */
    .item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .item:last-child { border-bottom: none; }
    .item:active { background: rgba(255,255,255,.04); }

    /* custom checkbox */
    .cb {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .cb svg { opacity: 0; transition: opacity .2s; }
    .item.checked .cb {
      background: var(--accent); border-color: var(--accent);
    }
    .item.checked .cb svg { opacity: 1; }

    .item-label {
      flex: 1; font-size: 15px; line-height: 1.3;
      transition: color .2s, text-decoration .2s;
    }
    .item.checked .item-label {
      color: var(--muted);
      text-decoration: line-through;
    }

    /* ── Reset button ── */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
    }
    #btn-reset {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    #btn-reset:active { background: rgba(248,113,113,.1); border-color: var(--danger); }
  </style>
</head>
<body>

<div id="header">
  <h1>✅ Чеклист для путешествия</h1>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="counter">Готово: <span id="cnt-done">0</span> из <span id="cnt-total">0</span></div>
</div>

<div id="checklist"></div>

<div id="footer">
  <button id="btn-reset" onclick="resetAll()">Сбросить всё</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const CATEGORIES = [
  {
    icon: '📄', name: 'Документы',
    items: ['Паспорт', 'Загранпаспорт', 'Виза', 'Страховка', 'Билеты', 'Бронь отеля', 'Медицинская карта', 'Копии документов', 'Водительские права', 'Рецепты на лекарства'],
  },
  {
    icon: '💊', name: 'Здоровье',
    items: ['Аптечка', 'Лекарства', 'Пластырь', 'Таблетки от живота', 'Солнцезащитный крем', 'Репеллент от насекомых', 'Витамины', 'Средство от укачивания', 'Набор первой помощи'],
  },
  {
    icon: '👕', name: 'Одежда',
    items: ['Нижнее бельё', 'Носки', 'Футболки', 'Штаны', 'Куртка', 'Удобная обувь', 'Тапочки', 'Купальник', 'Дождевик', 'Одежда для сна'],
  },
  {
    icon: '📱', name: 'Техника',
    items: ['Телефон', 'Зарядка', 'Павербанк', 'Наушники', 'Адаптер для розеток', 'Фотоаппарат'],
  },
  {
    icon: '🧴', name: 'Туалет',
    items: ['Зубная щётка', 'Паста', 'Шампунь', 'Мыло', 'Бритва', 'Полотенце', 'Зубная нить', 'Дезодорант', 'Расчёска', 'Бальзам для губ', 'Контактные линзы и раствор'],
  },
  {
    icon: '💰', name: 'Деньги',
    items: ['Наличные', 'Карта', 'Резервная карта', 'Пояс-кошелёк'],
  },
  {
    icon: '🎒', name: 'Разное',
    items: ['Замок для багажа', 'Беруши', 'Маска для сна', 'Фонарик', 'Зонт', 'Подушка для шеи', 'Жевательная резинка', 'Закуски в дорогу', 'Бирки для багажа'],
  },
];

const STORAGE_KEY = 'travel_checklist_v1';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function itemId(catIdx, itemIdx) { return `${catIdx}_${itemIdx}`; }

let state = loadState();

function render() {
  const list = document.getElementById('checklist');
  list.innerHTML = CATEGORIES.map((cat, ci) => `
    <div class="category">
      <div class="cat-header">${cat.icon} ${cat.name}</div>
      <div class="cat-items">
        ${cat.items.map((item, ii) => {
          const id = itemId(ci, ii);
          const checked = !!state[id];
          return `<div class="item${checked ? ' checked' : ''}" onclick="toggle('${id}', this)">
            <div class="cb">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5l3.5 3.5L11 1" stroke="#111827" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <span class="item-label">${item}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
  updateCounter();
}

function toggle(id, el) {
  state[id] = !state[id];
  saveState(state);
  el.classList.toggle('checked', !!state[id]);
  updateCounter();
}

function updateCounter() {
  const total = CATEGORIES.reduce((s, c) => s + c.items.length, 0);
  const done  = Object.values(state).filter(Boolean).length;
  document.getElementById('cnt-done').textContent  = done;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('progress-bar').style.width = total ? (done / total * 100) + '%' : '0%';
}

function resetAll() {
  state = {};
  saveState(state);
  document.querySelectorAll('.item.checked').forEach(el => el.classList.remove('checked'));
  updateCounter();
}

render();
</script>
</body>
</html>
