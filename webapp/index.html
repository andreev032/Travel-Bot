<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои страны</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: #0d1117; color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; }

    /* ── Header ── */
    #header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }
    #search {
      width: 100%; background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; padding: 9px 12px; color: #c9d1d9;
      font-size: 14px; outline: none;
    }
    #search::placeholder { color: #484f58; }
    #search:focus { border-color: #58a6ff; }

    /* ── Counter bar ── */
    #counter-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; background: #0d1117;
      border-bottom: 1px solid #21262d; flex-shrink: 0;
    }
    #counter-label { font-size: 13px; color: #8b949e; }
    #counter-badge {
      background: #21262d; color: #484f58;
      font-size: 12px; font-weight: 700;
      padding: 3px 11px; border-radius: 20px;
      min-width: 60px; text-align: center;
      transition: background .2s, color .2s;
    }
    #counter-badge.has { background: #238636; color: #fff; }

    /* ── List ── */
    #list {
      overflow-y: auto; flex: 1; padding: 6px 10px 90px;
      -webkit-overflow-scrolling: touch;
    }
    .row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px;
      cursor: pointer; transition: background .12s;
      user-select: none;
    }
    .row:active { background: #1c2128; }
    .row.on { background: #0f2617; }
    .flag { font-size: 21px; width: 28px; text-align: center; flex-shrink: 0; }
    .name { flex: 1; font-size: 14px; }
    .row.on .name { color: #3fb950; }
    .box {
      width: 21px; height: 21px; border: 2px solid #30363d;
      border-radius: 5px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .row.on .box { background: #238636; border-color: #238636; }
    .tick { display: none; }
    .row.on .tick { display: block; }
    .empty { text-align: center; color: #484f58; font-size: 14px; padding: 32px 0; }

    /* ── Bottom bar ── */
    #done-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 10px 12px 14px;
      background: linear-gradient(transparent, #0d1117 38%);
      pointer-events: none;
      display: flex; gap: 8px;
    }
    #btn-save {
      flex: 1; padding: 13px;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity .15s; pointer-events: all;
    }
    #btn-save:disabled { background: #21262d; color: #484f58; cursor: default; }
    #btn-save:not(:disabled):active { opacity: .8; }
    #btn-reset {
      padding: 13px 16px;
      background: #21262d; color: #8b949e;
      border: 1px solid #30363d; border-radius: 10px;
      font-size: 15px; cursor: pointer;
      transition: background .15s, color .15s; pointer-events: all;
    }
    #btn-reset:active { background: #2d333b; color: #c9d1d9; }
    #btn-reset.active {
      background: linear-gradient(135deg, #da3633, #f85149);
      color: #fff; border-color: transparent;
    }
    #btn-reset.active:active { opacity: .85; }
  </style>
</head>
<body>

<div id="header">
  <input id="search" type="text" placeholder="🔍 Поиск страны…" autocomplete="off" oninput="filter(this.value)">
</div>
<div id="counter-bar">
  <span id="counter-label">Посещено</span>
  <span id="counter-badge">0 из 0</span>
</div>
<div id="list"></div>
<div id="done-wrap">
  <button id="btn-save" disabled onclick="send()">💾 Сохранить</button>
  <button id="btn-reset" onclick="resetAll()">🗑 Сбросить всё</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
if (tg.setHeaderColor)    tg.setHeaderColor('#161b22');
if (tg.setBackgroundColor) tg.setBackgroundColor('#0d1117');

/* ── 199 стран и особых территорий ── */

  ["Аргентина","🇦🇷"],["Армения","🇦🇲"],["Афганистан","🇦🇫"],["Багамские острова","🇧🇸"],

  ["Белиз","🇧🇿"],["Бельгия","🇧🇪"],["Бенин","🇧🇯"],["Болгария","🇧🇬"],
  ["Боливия","🇧🇴"],["Босния и Герцеговина","🇧🇦"],["Ботсвана","🇧🇼"],["Бразилия","🇧🇷"],
  ["Бруней","🇧🇳"],["Буркина-Фасо","🇧🇫"],["Бурунди","🇧🇮"],["Бутан","🇧🇹"],
  ["Вануату","🇻🇺"],["Ватикан","🇻🇦"],["Великобритания","🇬🇧"],["Венгрия","🇭🇺"],
  ["Венесуэла","🇻🇪"],["Восточный Тимор","🇹🇱"],["Вьетнам","🇻🇳"],["Габон","🇬🇦"],
  ["Гаити","🇭🇹"],["Гайана","🇬🇾"],["Гамбия","🇬🇲"],["Гана","🇬🇭"],
  ["Гватемала","🇬🇹"],["Гвинея","🇬🇳"],["Гвинея-Бисау","🇬🇼"],["Германия","🇩🇪"],
  ["Гондурас","🇭🇳"],["Гонконг","🇭🇰"],["Гренада","🇬🇩"],["Греция","🇬🇷"],["Грузия","🇬🇪"],
  ["Дания","🇩🇰"],["Джибути","🇩🇯"],["Доминика","🇩🇲"],["Доминиканская Республика","🇩🇴"],
  ["ДР Конго","🇨🇩"],["Египет","🇪🇬"],["Замбия","🇿🇲"],["Западная Сахара","🇪🇭"],["Зимбабве","🇿🇼"],
  ["Израиль","🇮🇱"],["Индия","🇮🇳"],["Индонезия","🇮🇩"],["Иордания","🇯🇴"],
  ["Ирак","🇮🇶"],["Иран","🇮🇷"],["Ирландия","🇮🇪"],["Исландия","🇮🇸"],

  ["Казахстан","🇰🇿"],["Камбоджа","🇰🇭"],["Камерун","🇨🇲"],["Канада","🇨🇦"],
  ["Катар","🇶🇦"],["Кения","🇰🇪"],["Кипр","🇨🇾"],["Кирибати","🇰🇮"],
  ["Китай","🇨🇳"],["Колумбия","🇨🇴"],["Коморские острова","🇰🇲"],["Конго","🇨🇬"],["Косово","🇽🇰"],
  ["Коста-Рика","🇨🇷"],["Кот-д'Ивуар","🇨🇮"],["Куба","🇨🇺"],["Кувейт","🇰🇼"],
  ["Кыргызстан","🇰🇬"],["Лаос","🇱🇦"],["Латвия","🇱🇻"],["Лесото","🇱🇸"],
  ["Либерия","🇱🇷"],["Ливан","🇱🇧"],["Ливия","🇱🇾"],["Литва","🇱🇹"],
  ["Лихтенштейн","🇱🇮"],["Люксембург","🇱🇺"],["Маврикий","🇲🇺"],["Мавритания","🇲🇷"],
  ["Мадагаскар","🇲🇬"],["Макао","🇲🇴"],["Малави","🇲🇼"],["Малайзия","🇲🇾"],["Мали","🇲🇱"],
  ["Мальдивы","🇲🇻"],["Мальта","🇲🇹"],["Марокко","🇲🇦"],["Маршалловы острова","🇲🇭"],
  ["Мексика","🇲🇽"],["Микронезия","🇫🇲"],["Мозамбик","🇲🇿"],["Молдова","🇲🇩"],
  ["Монако","🇲🇨"],["Монголия","🇲🇳"],["Мьянма","🇲🇲"],["Намибия","🇳🇦"],
  ["Науру","🇳🇷"],["Непал","🇳🇵"],["Нигер","🇳🇪"],["Нигерия","🇳🇬"],
  ["Нидерланды","🇳🇱"],["Никарагуа","🇳🇮"],["Новая Зеландия","🇳🇿"],["Норвегия","🇳🇴"],
  ["ОАЭ","🇦🇪"],["Оман","🇴🇲"],["Пакистан","🇵🇰"],["Палау","🇵🇼"],
  ["Палестина","🇵🇸"],["Панама","🇵🇦"],["Папуа Новая Гвинея","🇵🇬"],["Парагвай","🇵🇾"],
  ["Перу","🇵🇪"],["Польша","🇵🇱"],["Португалия","🇵🇹"],["Приднестровье","🏴"],["Руанда","🇷🇼"],
  ["Румыния","🇷🇴"],["Россия","🇷🇺"],["Сальвадор","🇸🇻"],["Самоа","🇼🇸"],["Сан-Марино","🇸🇲"],
  ["Сан-Томе и Принсипи","🇸🇹"],["Саудовская Аравия","🇸🇦"],["Северная Корея","🇰🇵"],
  ["Северная Македония","🇲🇰"],["Сейшелы","🇸🇨"],["Сенегал","🇸🇳"],

  ["Сербия","🇷🇸"],["Сингапур","🇸🇬"],["Сирия","🇸🇾"],["Словакия","🇸🇰"],
  ["Словения","🇸🇮"],["Соломоновы острова","🇸🇧"],["Сомали","🇸🇴"],["Судан","🇸🇩"],
  ["Суринам","🇸🇷"],["США","🇺🇸"],["Сьерра-Леоне","🇸🇱"],["Таджикистан","🇹🇯"],
  ["Таиланд","🇹🇭"],["Тайвань","🇹🇼"],["Танзания","🇹🇿"],["Того","🇹🇬"],["Тонга","🇹🇴"],
  ["Тринидад и Тобаго","🇹🇹"],["Тувалу","🇹🇻"],["Тунис","🇹🇳"],["Туркменистан","🇹🇲"],
  ["Турция","🇹🇷"],["Уганда","🇺🇬"],["Узбекистан","🇺🇿"],["Украина","🇺🇦"],
  ["Уругвай","🇺🇾"],["Фиджи","🇫🇯"],["Филиппины","🇵🇭"],["Финляндия","🇫🇮"],
  ["Франция","🇫🇷"],["Хорватия","🇭🇷"],["ЦАР","🇨🇫"],["Чад","🇹🇩"],
  ["Черногория","🇲🇪"],["Чехия","🇨🇿"],["Чили","🇨🇱"],["Швейцария","🇨🇭"],
  ["Швеция","🇸🇪"],["Шри-Ланка","🇱🇰"],["Эквадор","🇪🇨"],["Экваториальная Гвинея","🇬🇶"],
  ["Эритрея","🇪🇷"],["Эсватини","🇸🇿"],["Эстония","🇪🇪"],["Эфиопия","🇪🇹"],
  ["Южная Корея","🇰🇷"],["Южный Судан","🇸🇸"],["Ямайка","🇯🇲"],["Япония","🇯🇵"],
];
const TOTAL = ALL.length;

const KEY = 'visited_v2';
let visited = new Set(JSON.parse(localStorage.getItem(KEY) || '[]'));
let query = '';

function save() { localStorage.setItem(KEY, JSON.stringify([...visited])); }

function render() {
  const q = query.toLowerCase();
  const items = q ? ALL.filter(([n]) => n.toLowerCase().includes(q)) : ALL;
  const el = document.getElementById('list');
  if (!items.length) { el.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
  el.innerHTML = items.map(([name, flag]) => {
    const on = visited.has(name);
    const safe = name.replace(/'/g, "\\'");
    return `<div class="row${on?' on':''}" onclick="toggle('${safe}')">
      <span class="flag">${flag}</span>
      <span class="name">${name}</span>
      <span class="box">
        <svg class="tick" width="12" height="9" viewBox="0 0 12 9" fill="none">
          <path d="M1 4l3.5 3.5L11 1" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>`;
  }).join('');
}

function updateCounter() {
  const n = visited.size;
  const badge = document.getElementById('counter-badge');
  badge.textContent = `${n} из ${TOTAL}`;
  badge.className = n ? 'has' : '';
  document.getElementById('btn-save').disabled = !n;
  document.getElementById('btn-reset').classList.toggle('active', n > 0);
}

function toggle(name) {
  visited.has(name) ? visited.delete(name) : visited.add(name);
  save(); render(); updateCounter();
}

function filter(v) { query = v; render(); }

function send() {
  if (!visited.size) return;
  tg.sendData(JSON.stringify({
    source: "countries",
    count: visited.size,
    total: TOTAL,
    visited: [...visited].sort(),
  }));
}

function resetAll() {
  if (!visited.size) return;
  if (!confirm("Сбросить все отметки?")) return;
  visited.clear();
  save(); render(); updateCounter();
}

render(); updateCounter();
</script>
</body>
</html>
