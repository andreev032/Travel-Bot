<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Travel Map</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      background: none;
      border: none;
      color: #8b949e;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* ── Panels ── */
    #panel-countries, #panel-map {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }
    .hidden { display: none !important; }

    /* ── Countries tab ── */
    #search-wrap {
      padding: 10px 12px 6px;
      background: #161b22;
      border-bottom: 1px solid #21262d;
      flex-shrink: 0;
    }
    #search {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 8px 12px;
      color: #c9d1d9;
      font-size: 14px;
      outline: none;
    }
    #search::placeholder { color: #484f58; }
    #search:focus { border-color: #58a6ff; }

    #counter-bar {
      padding: 8px 14px;
      background: #0d1117;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #counter-text { font-size: 13px; color: #8b949e; }
    #counter-badge {
      background: #238636;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
      min-width: 42px;
      text-align: center;
      transition: background .2s;
    }
    #counter-badge.zero { background: #21262d; color: #484f58; }

    #countries-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 10px 80px;
    }
    .country-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .15s;
      user-select: none;
    }
    .country-row:hover { background: #161b22; }
    .country-row.checked { background: #0f2617; }
    .country-row .cflag { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .country-row .cname { flex: 1; font-size: 14px; color: #c9d1d9; }
    .country-row.checked .cname { color: #3fb950; }
    .check-box {
      width: 20px; height: 20px;
      border: 2px solid #30363d;
      border-radius: 5px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .country-row.checked .check-box {
      background: #238636;
      border-color: #238636;
    }
    .check-box svg { display: none; }
    .country-row.checked .check-box svg { display: block; }
    .no-results {
      text-align: center;
      color: #484f58;
      font-size: 14px;
      padding: 30px 0;
    }

    /* ── Done button ── */
    #done-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 10px 12px 14px;
      background: linear-gradient(transparent, #0d1117 40%);
      z-index: 200;
    }
    #btn-done {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #238636, #2ea043);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    #btn-done:disabled { background: #21262d; color: #484f58; cursor: default; }
    #btn-done:not(:disabled):active { opacity: .8; }

    /* ── Map tab ── */
    #panel-map { position: relative; }
    #map { width: 100%; height: 100%; }

    #map-loading {
      position: absolute;
      inset: 0;
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 400;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #21262d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #map-loading p { color: #8b949e; font-size: 14px; }

    /* ── Country info sheet (map) ── */
    #info-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: #161b22;
      border-top: 1px solid #30363d;
      border-radius: 16px 16px 0 0;
      padding: 16px 16px 24px;
      z-index: 500;
      transform: translateY(100%);
      transition: transform .3s ease;
      box-shadow: 0 -8px 32px rgba(0,0,0,.5);
    }
    #info-sheet.open { transform: translateY(0); }

    #sheet-close {
      position: absolute;
      top: 12px; right: 14px;
      background: #21262d;
      border: none;
      color: #8b949e;
      width: 28px; height: 28px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    #sheet-close:hover { background: #30363d; }

    #sheet-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    #sheet-flag { font-size: 36px; line-height: 1; }
    #sheet-name { font-size: 18px; font-weight: 700; color: #f0f6fc; }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #21262d;
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { font-size: 16px; width: 22px; flex-shrink: 0; text-align: center; }
    .info-label { font-size: 12px; color: #8b949e; margin-bottom: 2px; }
    .info-value { font-size: 14px; color: #c9d1d9; }

    /* Leaflet dark tweaks */
    .leaflet-control-zoom a {
      background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important;
    }
    .leaflet-control-zoom a:hover { background: #21262d !important; }
    .leaflet-bar { border: 1px solid #30363d !important; }
    .leaflet-control-attribution {
      background: rgba(13,17,23,.75) !important; color: #484f58 !important; font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #6e7681 !important; }
  </style>
</head>
<body>

<div id="tabs">
  <button class="tab-btn active" onclick="showTab('countries')">🌍 Мои страны</button>
  <button class="tab-btn" onclick="showTab('map')">🗺 Карта</button>
</div>

<!-- ── Countries tab ── -->
<div id="panel-countries">
  <div id="search-wrap">
    <input id="search" type="text" placeholder="🔍 Поиск страны…" oninput="filterList(this.value)" autocomplete="off">
  </div>
  <div id="counter-bar">
    <span id="counter-text">Посещено</span>
    <span id="counter-badge" class="zero">0 / 0</span>
  </div>
  <div id="countries-list"></div>
  <div id="done-wrap">
    <button id="btn-done" disabled onclick="sendData()">Готово — отправить в бот</button>
  </div>
</div>

<!-- ── Map tab ── -->
<div id="panel-map" class="hidden">
  <div id="map"></div>
  <div id="map-loading">
    <div class="spinner"></div>
    <p>Загрузка карты…</p>
  </div>
  <!-- Country info bottom sheet -->
  <div id="info-sheet">
    <button id="sheet-close" onclick="closeSheet()">✕</button>
    <div id="sheet-header">
      <span id="sheet-flag">🌍</span>
      <span id="sheet-name">—</span>
    </div>
    <div id="sheet-body"></div>
  </div>
</div>

const TOTAL = RAW.length;
const COUNTRIES = RAW.map(([ru, flag, en, visa, time, budget]) => ({ ru, flag, en, visa, time, budget }));

// lookup by English GeoJSON name
const BY_EN = {};
COUNTRIES.forEach(c => { BY_EN[c.en.toLowerCase()] = c; });

/* ── Visited state ── */
const STORAGE_KEY = 'travel_visited_v1';
let visited = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));

function saveVisited() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...visited]));
}

/* ════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════ */
let activeTab = 'countries';
let mapInitialized = false;

function showTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'countries') || (i === 1 && tab === 'map'));
  });
  document.getElementById('panel-countries').classList.toggle('hidden', tab !== 'countries');
  document.getElementById('panel-map').classList.toggle('hidden', tab !== 'map');
  document.getElementById('done-wrap').classList.toggle('hidden', tab !== 'countries');

  if (tab === 'map' && !mapInitialized) initMap();
}

/* ════════════════════════════════════
   COUNTRIES TAB
════════════════════════════════════ */
let currentFilter = '';

function renderList(filter) {
  const q = (filter || '').trim().toLowerCase();
  const list = document.getElementById('countries-list');
  const items = q
    ? COUNTRIES.filter(c => c.ru.toLowerCase().includes(q))
    : COUNTRIES;

  if (items.length === 0) {
    list.innerHTML = '<div class="no-results">Ничего не найдено</div>';
    return;
  }

  list.innerHTML = items.map(c => {
    const chk = visited.has(c.ru);
    return `<div class="country-row${chk ? ' checked' : ''}" onclick="toggleVisited('${c.ru.replace(/'/g,"\\'")}')">
      <span class="cflag">${c.flag}</span>
      <span class="cname">${c.ru}</span>
      <span class="check-box">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5l3.5 3.5L11 1" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </div>`;
  }).join('');
}

function toggleVisited(name) {
  if (visited.has(name)) {
    visited.delete(name);
  } else {
    visited.add(name);
  }
  saveVisited();
  renderList(currentFilter);
  updateCounter();
}

function updateCounter() {
  const n = visited.size;
  document.getElementById('counter-badge').textContent = `${n} / ${TOTAL}`;
  document.getElementById('counter-badge').classList.toggle('zero', n === 0);
  document.getElementById('btn-done').disabled = n === 0;
}

function filterList(value) {
  currentFilter = value;
  renderList(value);
}

function sendData() {
  if (visited.size === 0) return;
  const data = JSON.stringify({ visited: [...visited].sort() });
  tg.sendData(data);
}

/* init countries tab */
renderList('');
updateCounter();

/* ════════════════════════════════════
   MAP TAB
════════════════════════════════════ */
let map, geojsonLayer;

function initMap() {
  mapInitialized = true;

  map = L.map('map', { center: [25, 15], zoom: 2, minZoom: 1, maxZoom: 7, zoomControl: true });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CartoDB',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  const S = {
    default:  { fillColor: '#1f3a5f', fillOpacity: 0.55, color: '#2d5a8e', weight: 0.6 },
    hover:    { fillColor: '#2d5a9f', fillOpacity: 0.75, color: '#4d8abf', weight: 1   },
  };

  function getName(f) {
    return f.properties.name || f.properties.ADMIN || f.properties.NAME || '';
  }

  function lookup(name) {
    const key = (name || '').toLowerCase();
    return BY_EN[key] || null;
  }

  function onEach(feature, layer) {
    const name = getName(feature);
    layer.on({
      mouseover(e) { e.target.setStyle(S.hover); },
      mouseout(e)  { geojsonLayer.resetStyle(e.target); },
      click(e) {
        L.DomEvent.stopPropagation(e);
        const info = lookup(name);
        openSheet(info, name);
      },
    });
  }

  fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(data => {
      geojsonLayer = L.geoJSON(data, { style: S.default, onEachFeature: onEach }).addTo(map);
      document.getElementById('map-loading').style.display = 'none';
    })
    .catch(() => {
      document.getElementById('map-loading').innerHTML =
        '<p style="color:#da3633;text-align:center;padding:20px">Не удалось загрузить карту.<br>Проверь интернет-соединение.</p>';
    });
}

/* ── Info sheet ── */
function openSheet(info, rawName) {
  const sheet = document.getElementById('info-sheet');
  if (info) {
    document.getElementById('sheet-flag').textContent = info.flag;
    document.getElementById('sheet-name').textContent = info.ru;
    document.getElementById('sheet-body').innerHTML = `
      <div class="info-row">
        <span class="info-icon">🛂</span>
        <div><div class="info-label">Виза для россиян</div><div class="info-value">${info.visa}</div></div>
      </div>
      <div class="info-row">
        <span class="info-icon">📅</span>
        <div><div class="info-label">Лучшее время</div><div class="info-value">${info.time}</div></div>
      </div>
      <div class="info-row">
        <span class="info-icon">💰</span>
        <div><div class="info-label">Средний бюджет</div><div class="info-value">${info.budget}</div></div>
      </div>`;
  } else {
    document.getElementById('sheet-flag').textContent = '🌍';
    document.getElementById('sheet-name').textContent = rawName || '—';
    document.getElementById('sheet-body').innerHTML = `
      <div class="info-row">
        <span class="info-icon">ℹ️</span>
        <div><div class="info-value" style="color:#8b949e">Подробная информация<br>по этой стране пока не добавлена</div></div>
      </div>`;
  }
  sheet.classList.add('open');
}

function closeSheet() {
  document.getElementById('info-sheet').classList.remove('open');
}

/* close sheet on map click */
document.getElementById('map').addEventListener('click', () => closeSheet());
