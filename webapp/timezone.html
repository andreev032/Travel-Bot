<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🕐 Разница во времени</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:      #1a1a2e;
      --surface: #16213e;
      --card:    #0f3460;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --warn:    #d29922;
      --danger:  #f85149;
      --text:    #e6edf3;
      --sub:     #7d8590;
      --border:  #2a3a5c;
      --radius:  14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 24px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 16px 11px;
      text-align: center;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; color: var(--sub); margin-top: 3px; }

    main { padding: 14px; }

    /* ── TIME ROW ── */
    .time-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      margin-bottom: 14px;
      align-items: stretch;
    }

    .time-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }

    .tc-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 2px;
    }
    .time-card.from .tc-label { color: var(--accent); }
    .time-card.to   .tc-label { color: var(--green); }

    .tc-city {
      font-size: 12px;
      font-weight: 600;
      color: var(--sub);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .time-card.from .tc-city { color: var(--accent); }
    .time-card.to   .tc-city { color: var(--green); }

    .tc-clock {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .time-card.from .tc-clock { color: var(--accent); }
    .time-card.to   .tc-clock { color: var(--green); }

    .tc-date { font-size: 11px; color: var(--sub); }
    .tc-utc  { font-size: 10px; color: var(--sub); }

    .tc-badge {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .tc-badge.work    { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid var(--green); }
    .tc-badge.evening { background: rgba(210,153,34,.15); color: var(--warn);   border: 1px solid var(--warn); }
    .tc-badge.night   { background: rgba(248,81,73,.15);  color: var(--danger); border: 1px solid var(--danger); }

    .tc-empty { font-size: 13px; color: var(--sub); }

    /* diff column */
    .diff-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 52px;
    }
    .diff-val {
      font-size: 20px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      white-space: pre;
    }
    .diff-val.pos  { color: var(--green); }
    .diff-val.neg  { color: var(--accent); }
    .diff-val.zero { color: var(--sub); }
    .diff-unit { font-size: 10px; color: var(--sub); margin-top: 2px; }
    .diff-arrow { font-size: 22px; color: var(--sub); }

    /* SWAP */
    .swap-row {
      display: flex;
      justify-content: center;
      margin-bottom: 14px;
    }
    .swap-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .swap-btn:active { opacity: .7; }

    /* ── SEARCH BLOCK ── */
    .search-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
      position: relative;   /* stacking context for dropdown */
    }

    .sb-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 8px;
    }
    .sb-label.from { color: var(--accent); }
    .sb-label.to   { color: var(--green); }

    .sb-wrap { position: relative; }

    .sb-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-size: 15px;
      padding: 10px 12px 10px 36px;
      outline: none;
      transition: border-color .15s;
      /* prevent zoom on iOS */
      font-size: 16px;
    }
    .sb-input:focus { border-color: var(--accent); }

    .sb-icon {
      position: absolute;
      left: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
      user-select: none;
    }

    .sb-clear {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--sub);
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      display: none;
    }

    /* DROPDOWN — sits inside .search-block, full width */
    .sb-dropdown {
      position: absolute;
      left: 12px; right: 12px;
      top: calc(100% - 10px);   /* flush below input inside the card */
      background: #1c2a42;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    .sb-dropdown.open { display: block; }

    .dd-item {
      padding: 11px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      /* IMPORTANT: use mousedown not click — fires before input blur */
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover, .dd-item:active { background: var(--card); }

    .dd-flag { font-size: 20px; flex-shrink: 0; }
    .dd-name { font-weight: 600; font-size: 14px; }
    .dd-meta { font-size: 11px; color: var(--sub); }
    .dd-none { padding: 12px 14px; color: var(--sub); font-size: 13px; }
  </style>
</head>
<body>

<header>
  <h1>🕐 Разница во времени</h1>
  <p>Введи города — покажу текущее время и разницу</p>
</header>

<main>

  <!-- TIME DISPLAY -->
  <div class="time-row">
    <div class="time-card from" id="card-from">
      <div class="tc-label">Откуда</div>
      <div class="tc-empty">выбери город</div>
    </div>
    <div class="diff-col" id="diff-col">
      <div class="diff-arrow">⇄</div>
    </div>
    <div class="time-card to" id="card-to">
      <div class="tc-label">Куда</div>
      <div class="tc-empty">выбери город</div>
    </div>
  </div>

  <!-- SEARCH FROM -->
  <div class="search-block" id="sb-from">
    <div class="sb-label from">📍 Откуда</div>
    <div class="sb-wrap">
      <span class="sb-icon">🔍</span>
      <input class="sb-input" id="inp-from" type="text"
             placeholder="Город или страна…"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="sb-clear" id="clr-from" tabindex="-1" aria-label="Очистить">×</button>
    </div>
    <div class="sb-dropdown" id="dd-from"></div>
  </div>

  <!-- SWAP -->
  <div class="swap-row">
    <button class="swap-btn" onclick="swapCities()">⇅</button>
  </div>

  <!-- SEARCH TO -->
  <div class="search-block" id="sb-to">
    <div class="sb-label to">🏁 Куда</div>
    <div class="sb-wrap">
      <span class="sb-icon">🔍</span>
      <input class="sb-input" id="inp-to" type="text"
             placeholder="Город или страна…"
             autocomplete="off" autocorrect="off" spellcheck="false" />
      <button class="sb-clear" id="clr-to" tabindex="-1" aria-label="Очистить">×</button>
    </div>
    <div class="sb-dropdown" id="dd-to"></div>
  </div>

</main>

/* ═══════════════════════════════════════════════════════
   SEARCH LOGIC
═══════════════════════════════════════════════════════ */
function search(q) {
  if (!q || q.length < 1) return [];
  const lq = q.toLowerCase();
  const seen = new Set();
  const result = [];
  for (const c of DB) {
    const key = c.tz + c.name;
    if (seen.has(key)) continue;
    if (c.name.toLowerCase().includes(lq) ||
        c.country.toLowerCase().includes(lq) ||
        c.a.some(x => x.includes(lq))) {
      seen.add(key);
      result.push(c);
      if (result.length >= 8) break;
    }
  }
  return result;
}

let sel = { from: null, to: null }; // selected city objects

const tg = window.Telegram?.WebApp;

/* ═══════════════════════════════════════════════════════
   SEARCH UI — for each slot (from/to)
═══════════════════════════════════════════════════════ */
['from','to'].forEach(slot => {
  const inp = document.getElementById(`inp-${slot}`);
  const dd  = document.getElementById(`dd-${slot}`);
  const clr = document.getElementById(`clr-${slot}`);

  inp.addEventListener('input', () => {
    clr.style.display = inp.value ? 'block' : 'none';
    showDropdown(slot, inp.value);
  });

  inp.addEventListener('focus', () => {
    if (inp.value) showDropdown(slot, inp.value);
  });

  // Hide dropdown on blur — but ONLY if the mousedown wasn't on a dd-item
  // (mousedown on dd-item fires BEFORE blur, sets a flag)
  inp.addEventListener('blur', () => {
    // small delay so mousedown on dd-item can fire first
    setTimeout(() => closeDropdown(slot), 150);
  });

  clr.addEventListener('mousedown', e => {
    e.preventDefault(); // prevent input blur
    inp.value = '';
    clr.style.display = 'none';
    sel[slot] = null;
    closeDropdown(slot);
    renderCard(slot);
    renderDiff();
  });
});

function showDropdown(slot, q) {
  const dd = document.getElementById(`dd-${slot}`);
  const results = search(q);

  if (!q.trim() || !results.length) {
    dd.innerHTML = q.trim()
      ? `<div class="dd-none">Ничего не найдено</div>`
      : '';
    dd.classList.toggle('open', !!q.trim());
    return;
  }

  dd.innerHTML = results.map((c, i) =>
    `<div class="dd-item" data-slot="${slot}" data-idx="${i}">
       <span class="dd-flag">${c.flag}</span>
       <div>
         <div class="dd-name">${c.name}</div>
         <div class="dd-meta">${c.country} · ${fmtOffset(c.tz)}</div>
       </div>
     </div>`
  ).join('');

  // Store results so mousedown handler can access them
  dd._results = results;

  // Use mousedown (fires before blur) to pick a city
  dd.querySelectorAll('.dd-item').forEach(el => {
    el.addEventListener('mousedown', e => {
      e.preventDefault(); // crucial — prevents input losing focus before we read value
      const city = dd._results[+el.dataset.idx];
      pickCity(slot, city);
    });
    // touchstart for mobile
    el.addEventListener('touchstart', e => {
      e.preventDefault();
      const city = dd._results[+el.dataset.idx];
      pickCity(slot, city);
    }, { passive: false });
  });

  dd.classList.add('open');
}

function closeDropdown(slot) {
  document.getElementById(`dd-${slot}`).classList.remove('open');
}

function pickCity(slot, city) {
  sel[slot] = city;
  const inp = document.getElementById(`inp-${slot}`);
  inp.value = `${city.flag} ${city.name}, ${city.country}`;
  document.getElementById(`clr-${slot}`).style.display = 'block';
  closeDropdown(slot);
  renderCard(slot);
  renderDiff();
}

/* ═══════════════════════════════════════════════════════
   SWAP
═══════════════════════════════════════════════════════ */
function swapCities() {
  [sel.from, sel.to] = [sel.to, sel.from];
  ['from','to'].forEach(s => {
    const inp = document.getElementById(`inp-${s}`);
    const clr = document.getElementById(`clr-${s}`);
    if (sel[s]) {
      inp.value = `${sel[s].flag} ${sel[s].name}, ${sel[s].country}`;
      clr.style.display = 'block';
    } else {
      inp.value = '';
      clr.style.display = 'none';
    }
    renderCard(s);
  });
  renderDiff();
}

/* ═══════════════════════════════════════════════════════
   TIME HELPERS
═══════════════════════════════════════════════════════ */
function fmtTime(tz) {
  return new Intl.DateTimeFormat('ru', {
    timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
  }).format(new Date());
}
function fmtDate(tz) {
  return new Intl.DateTimeFormat('ru', {
    timeZone: tz, weekday:'short', day:'numeric', month:'short'
  }).format(new Date());
}
function getOffsetMin(tz) {
  const now = new Date();
  const loc = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const utc = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  return Math.round((loc - utc) / 60000);
}
function fmtOffset(tz) {
  const m = getOffsetMin(tz);
  const h = Math.floor(Math.abs(m) / 60);
  const mn = Math.abs(m) % 60;
  const sign = m >= 0 ? '+' : '−';
  return `UTC${sign}${h}${mn ? ':' + String(mn).padStart(2,'0') : ''}`;
}
function workBadge(tz) {
  const h = parseInt(new Intl.DateTimeFormat('ru', {
    timeZone: tz, hour:'2-digit', hour12: false
  }).format(new Date()), 10);
  if (h >= 9 && h < 18)  return { cls:'work',    text:'💼 Рабочее' };
  if (h >= 18 && h < 23) return { cls:'evening', text:'🌆 Вечер' };
  return                          { cls:'night',   text:'🌙 Ночь' };
}

/* ═══════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════ */
function renderCard(slot) {
  const el   = document.getElementById(`card-${slot}`);
  const city = sel[slot];
  const lbl  = slot === 'from' ? 'Откуда' : 'Куда';

  if (!city) {
    el.innerHTML = `<div class="tc-label">${lbl}</div><div class="tc-empty">выбери город</div>`;
    return;
  }
  const wb = workBadge(city.tz);
  el.innerHTML = `
    <div class="tc-label">${lbl}</div>
    <div class="tc-city">${city.flag} ${city.name}</div>
    <div class="tc-clock">${fmtTime(city.tz)}</div>
    <div class="tc-date">${fmtDate(city.tz)}</div>
    <div class="tc-utc">${fmtOffset(city.tz)}</div>
    <span class="tc-badge ${wb.cls}">${wb.text}</span>
  `;
}

function renderDiff() {
  const col = document.getElementById('diff-col');
  if (!sel.from || !sel.to) {
    col.innerHTML = '<div class="diff-arrow">⇄</div>';
    return;
  }
  const diffMin = getOffsetMin(sel.to.tz) - getOffsetMin(sel.from.tz);
  const absH = Math.floor(Math.abs(diffMin) / 60);
  const absM = Math.abs(diffMin) % 60;

  let valHtml, cls;
  if (diffMin === 0) {
    valHtml = '= 0'; cls = 'zero';
  } else {
    const sign = diffMin > 0 ? '+' : '−';
    valHtml = absM
      ? `${sign}${absH}ч\n${absM}м`
      : `${sign}${absH}ч`;
    cls = diffMin > 0 ? 'pos' : 'neg';
  }
  col.innerHTML = `
    <div class="diff-val ${cls}">${valHtml}</div>
    <div class="diff-unit">разница</div>
  `;
}

/* ═══════════════════════════════════════════════════════
   TICK — every second
═══════════════════════════════════════════════════════ */
function tick() {
  ['from','to'].forEach(slot => {
    const city = sel[slot];
    if (!city) return;
    const card = document.getElementById(`card-${slot}`);
    const cl = card.querySelector('.tc-clock');
    const dt = card.querySelector('.tc-date');
    const wb = card.querySelector('.tc-badge');
    if (cl) cl.textContent = fmtTime(city.tz);
    if (dt) dt.textContent = fmtDate(city.tz);
    if (wb) { const b = workBadge(city.tz); wb.textContent = b.text; wb.className = `tc-badge ${b.cls}`; }
  });
}
setInterval(tick, 1000);

/* ═══════════════════════════════════════════════════════
   INIT — auto-detect local timezone
═══════════════════════════════════════════════════════ */
try {
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const found = DB.find(c => c.tz === localTz);
  if (found) pickCity('from', found);
} catch(e) {}

renderCard('from');
renderCard('to');
renderDiff();
</script>
</body>
