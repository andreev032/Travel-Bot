<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>🕐 Разница во времени</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --card:    #1c2230;
      --border:  #30363d;
      --accent:  #58a6ff;
      --green:   #3fb950;
      --warn:    #d29922;
      --danger:  #f85149;
      --text:    #e6edf3;
      --sub:     #7d8590;
      --radius:  12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100vh;
      padding-bottom: 24px;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 16px 11px;
      text-align: center;
    }
    header h1 { font-size: 18px; font-weight: 700; }
    header p  { font-size: 12px; color: var(--sub); margin-top: 3px; }

    main { padding: 14px; }

    /* ── CITY PICKER ── */
    .picker-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
    }
    .picker-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 8px;
    }
    .picker-label.from { color: var(--accent); }
    .picker-label.to   { color: var(--green); }

    .filter-input {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 8px 10px 8px 32px;
      width: 100%;
      outline: none;
      margin-bottom: 6px;
      transition: border-color .15s;
    }
    .filter-input:focus { border-color: var(--accent); }
    .filter-wrap { position: relative; }
    .filter-wrap::before {
      content: '🔍';
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-55%);
      font-size: 14px;
      pointer-events: none;
    }

    select {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 6px 8px;
      width: 100%;
      outline: none;
      height: 160px;
      cursor: pointer;
      transition: border-color .15s;
    }
    select:focus { border-color: var(--accent); }
    select option { padding: 4px; background: var(--card); }
    select option:checked { background: #1f3a5f; }

    /* ── SWAP ── */
    .swap-row {
      display: flex;
      justify-content: center;
      margin: -2px 0 8px;
    }
    .swap-btn {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 38px; height: 38px;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .swap-btn:active { background: var(--surface); }

    /* ── TIME DISPLAY ── */
    .time-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      margin-bottom: 10px;
      align-items: stretch;
    }

    .time-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
    }
    .time-card .city-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--sub);
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .time-card.from .city-name { color: var(--accent); }
    .time-card.to   .city-name { color: var(--green); }

    .time-card .clock {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .time-card.from .clock { color: var(--accent); }
    .time-card.to   .clock { color: var(--green); }

    .time-card .date-str {
      font-size: 11px;
      color: var(--sub);
      margin-top: 3px;
    }
    .time-card .utc-str {
      font-size: 11px;
      color: var(--sub);
      margin-top: 1px;
    }
    .time-card .work-badge {
      display: inline-block;
      margin-top: 5px;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
    }
    .work-badge.work    { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid var(--green); }
    .work-badge.evening { background: rgba(210,153,34,.15); color: var(--warn);   border: 1px solid var(--warn); }
    .work-badge.night   { background: rgba(248,81,73,.15);  color: var(--danger); border: 1px solid var(--danger); }

    /* diff centre column */
    .diff-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 54px;
    }
    .diff-arrow { font-size: 20px; color: var(--sub); }
    .diff-val {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
    }
    .diff-val.pos  { color: var(--green); }
    .diff-val.neg  { color: var(--accent); }
    .diff-val.zero { color: var(--sub); }
    .diff-unit { font-size: 10px; color: var(--sub); }

    /* ── POPULAR ── */
    .section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--sub);
      margin-bottom: 8px;
    }
    .pop-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 14px;
    }
    .pop-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      cursor: pointer;
      font-size: 11px;
      padding: 7px 4px;
      text-align: center;
      transition: all .12s;
      line-height: 1.3;
    }
    .pop-btn .pf { font-size: 17px; display: block; margin-bottom: 2px; }
    .pop-btn:active { opacity: .75; }
    .pop-btn.af { border-color: var(--accent); background: rgba(88,166,255,.1); color: var(--accent); }
    .pop-btn.at { border-color: var(--green);  background: rgba(63,185,80,.1);  color: var(--green); }

    .placeholder-text {
      font-size: 13px;
      color: var(--sub);
      text-align: center;
      padding: 8px 0 4px;
    }
  </style>
</head>
<body>

<header>
  <h1>🕐 Разница во времени</h1>
  <p>Выбери города — покажу текущее время и разницу</p>
</header>

<main>

  <!-- TIME DISPLAY ROW -->
  <div class="time-row">
    <div class="time-card from" id="card-from">
      <div class="city-name">—</div>
      <div class="placeholder-text">выбери<br>город</div>
    </div>
    <div class="diff-col" id="diff-col">
      <div class="diff-arrow">⇄</div>
    </div>
    <div class="time-card to" id="card-to">
      <div class="city-name">—</div>
      <div class="placeholder-text">выбери<br>город</div>
    </div>
  </div>

  <!-- FROM PICKER -->
  <div class="picker-block">
    <div class="picker-label from">📍 Откуда</div>
    <div class="filter-wrap">
      <input class="filter-input" id="filter-from" type="text" placeholder="Фильтр городов…" autocomplete="off" />
    </div>
    <select id="select-from" size="6" onchange="onSelectChange('from')">
    </select>
  </div>

  <!-- SWAP -->
  <div class="swap-row">
    <button class="swap-btn" onclick="swapCities()" title="Поменять местами">⇅</button>
  </div>

  <!-- TO PICKER -->
  <div class="picker-block">
    <div class="picker-label to">🏁 Куда</div>
    <div class="filter-wrap">
      <input class="filter-input" id="filter-to" type="text" placeholder="Фильтр городов…" autocomplete="off" />
    </div>
    <select id="select-to" size="6" onchange="onSelectChange('to')">
    </select>
  </div>

  <!-- POPULAR -->
  <div class="section-title">⚡ Быстрый выбор</div>
  <div class="pop-grid" id="pop-grid"></div>

</main>

// STATE
// ════════════════════════════════════════════════
let tzFrom = null;
let tzTo   = null;

// ════════════════════════════════════════════════
// TELEGRAM
// ════════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

// ════════════════════════════════════════════════
// BUILD SELECT OPTIONS
// ════════════════════════════════════════════════
function buildOptions(filterText) {
  const q = (filterText || '').toLowerCase().trim();
  return CITIES.filter(c => !q || c.label.toLowerCase().includes(q) || c.tz.toLowerCase().includes(q));
}

function populateSelect(selectId, filterId, selectedTz) {
  const sel    = document.getElementById(selectId);
  const filter = document.getElementById(filterId).value;
  const list   = buildOptions(filter);
  const prev   = sel.value;

  sel.innerHTML = list.map(c =>
    `<option value="${c.tz}"${c.tz === (selectedTz ?? prev) ? ' selected' : ''}>${c.label}</option>`
  ).join('');

  // If selected item disappeared from filter, deselect
  if (selectedTz && !list.find(c => c.tz === selectedTz)) sel.value = '';
}

function initSelects() {
  populateSelect('select-from', 'filter-from', tzFrom);
  populateSelect('select-to',   'filter-to',   tzTo);
}

// filter inputs
document.getElementById('filter-from').addEventListener('input', () => {
  populateSelect('select-from', 'filter-from', null);
});
document.getElementById('filter-to').addEventListener('input', () => {
  populateSelect('select-to', 'filter-to', null);
});

// select change
function onSelectChange(slot) {
  const val = document.getElementById(`select-${slot}`).value;
  if (!val) return;
  if (slot === 'from') tzFrom = val;
  else                 tzTo   = val;
  renderAll();
}

// ════════════════════════════════════════════════
// SWAP
// ════════════════════════════════════════════════
function swapCities() {
  [tzFrom, tzTo] = [tzTo, tzFrom];
  populateSelect('select-from', 'filter-from', tzFrom);
  populateSelect('select-to',   'filter-to',   tzTo);
  renderAll();
}

// ════════════════════════════════════════════════
// POPULAR GRID
// ════════════════════════════════════════════════
function renderPopular() {
  document.getElementById('pop-grid').innerHTML = POPULAR.map(([name, tz, flag]) => {
    const af = tzFrom === tz ? 'af' : '';
    const at = tzTo   === tz ? 'at' : '';
    return `<button class="pop-btn ${af} ${at}" onclick="pickPopular('${tz}')">
      <span class="pf">${flag}</span>${name}
    </button>`;
  }).join('');
}

function pickPopular(tz) {
  if (!tzFrom)       { tzFrom = tz; populateSelect('select-from','filter-from', tz); }
  else if (!tzTo)    { tzTo   = tz; populateSelect('select-to',  'filter-to',   tz); }
  else               { tzTo   = tz; populateSelect('select-to',  'filter-to',   tz); }
  renderAll();
}

// ════════════════════════════════════════════════
// TIME HELPERS
// ════════════════════════════════════════════════
function fmtTime(tz) {
  return new Intl.DateTimeFormat('ru', {
    timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: false
  }).format(new Date());
}

function fmtDate(tz) {
  return new Intl.DateTimeFormat('ru', {
    timeZone: tz, weekday:'short', day:'numeric', month:'short'
  }).format(new Date());
}

function getOffsetMin(tz) {
  const now = new Date();
  const utc = Date.UTC(
    now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate(),
    now.getUTCHours(),    now.getUTCMinutes()
  );
  const loc = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const utcD = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  return Math.round((loc - utcD) / 60000);
}

function fmtOffset(tz) {
  const m = getOffsetMin(tz);
  const h = Math.floor(Math.abs(m) / 60);
  const min = Math.abs(m) % 60;
  const sign = m >= 0 ? '+' : '−';
  return `UTC${sign}${h}${min ? ':' + String(min).padStart(2,'0') : ''}`;
}

function workStatus(tz) {
  const h = parseInt(new Intl.DateTimeFormat('ru', {
    timeZone: tz, hour:'2-digit', hour12: false
  }).format(new Date()), 10);
  if (h >= 9 && h < 18)  return { cls:'work',    text:'💼 Рабочее' };
  if (h >= 18 && h < 23) return { cls:'evening', text:'🌆 Вечер' };
  return                          { cls:'night',   text:'🌙 Ночь' };
}

// city label from tz
function labelOf(tz) {
  const c = CITIES.find(x => x.tz === tz);
  return c ? c.label.replace(/\s*\(UTC.*\)$/, '') : tz;
}

// ════════════════════════════════════════════════
// RENDER CARD
// ════════════════════════════════════════════════
function renderCard(id, tz) {
  const el = document.getElementById(id);
  if (!tz) {
    el.innerHTML = `<div class="city-name">—</div><div class="placeholder-text">выбери<br>город</div>`;
    return;
  }
  const ws = workStatus(tz);
  el.innerHTML = `
    <div class="city-name">${labelOf(tz)}</div>
    <div class="clock">${fmtTime(tz)}</div>
    <div class="date-str">${fmtDate(tz)}</div>
    <div class="utc-str">${fmtOffset(tz)}</div>
    <span class="work-badge ${ws.cls}">${ws.text}</span>
  `;
}

// ════════════════════════════════════════════════
// RENDER DIFF
// ════════════════════════════════════════════════
function renderDiff() {
  const col = document.getElementById('diff-col');
  if (!tzFrom || !tzTo) { col.innerHTML = '<div class="diff-arrow">⇄</div>'; return; }

  const diffMin = getOffsetMin(tzTo) - getOffsetMin(tzFrom);
  const absH = Math.floor(Math.abs(diffMin) / 60);
  const absM = Math.abs(diffMin) % 60;

  let valText, cls;
  if (diffMin === 0) {
    valText = '=0'; cls = 'zero';
  } else {
    const sign = diffMin > 0 ? '+' : '−';
    valText = absM ? `${sign}${absH}ч\n${absM}м` : `${sign}${absH}ч`;
    cls = diffMin > 0 ? 'pos' : 'neg';
  }

  col.innerHTML = `
    <div class="diff-val ${cls}" style="white-space:pre;text-align:center">${valText}</div>
    <div class="diff-unit">разница</div>
  `;
}

// ════════════════════════════════════════════════
// TICK
// ════════════════════════════════════════════════
function tick() {
  if (tzFrom) {
    const card = document.getElementById('card-from');
    const cl = card.querySelector('.clock');
    const dt = card.querySelector('.date-str');
    const wb = card.querySelector('.work-badge');
    if (cl) cl.textContent = fmtTime(tzFrom);
    if (dt) dt.textContent = fmtDate(tzFrom);
    if (wb) { const ws = workStatus(tzFrom); wb.textContent = ws.text; wb.className = `work-badge ${ws.cls}`; }
  }
  if (tzTo) {
    const card = document.getElementById('card-to');
    const cl = card.querySelector('.clock');
    const dt = card.querySelector('.date-str');
    const wb = card.querySelector('.work-badge');
    if (cl) cl.textContent = fmtTime(tzTo);
    if (dt) dt.textContent = fmtDate(tzTo);
    if (wb) { const ws = workStatus(tzTo); wb.textContent = ws.text; wb.className = `work-badge ${ws.cls}`; }
  }
}

// ════════════════════════════════════════════════
// RENDER ALL
// ════════════════════════════════════════════════
function renderAll() {
  renderCard('card-from', tzFrom);
  renderCard('card-to',   tzTo);
  renderDiff();
  renderPopular();
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
// Auto-detect local timezone for "from"
try {
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  if (CITIES.find(c => c.tz === localTz)) tzFrom = localTz;
} catch(e) {}

initSelects();
renderAll();
setInterval(tick, 1000);
</script>
