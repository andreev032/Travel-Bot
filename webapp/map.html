<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карта мира</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column;
      background: #f0f4f8;
    }

    /* ── Search bar ── */
    #search-bar {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 12px;
      position: relative;
      z-index: 1000;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    #search-wrap {
      display: flex; align-items: center; gap: 8px;
      position: relative;
    }
    #search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #a0aec0; font-size: 15px; pointer-events: none;
    }
    #search-input {
      flex: 1;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px 10px 36px;
      font-size: 14px; color: #1a202c; outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    #search-input::placeholder { color: #a0aec0; }
    #search-input:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66,153,225,.15);
      background: #fff;
    }
    #btn-search {
      flex-shrink: 0;
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: #fff; border: none; border-radius: 10px;
      padding: 10px 18px; font-size: 14px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      box-shadow: 0 2px 6px rgba(66,153,225,.4);
      transition: opacity .15s, transform .1s;
    }
    #btn-search:hover  { opacity: .9; }
    #btn-search:active { transform: scale(.97); }
    #btn-search:disabled {
      background: linear-gradient(135deg, #a0aec0, #718096);
      box-shadow: none; cursor: default; transform: none;
    }

    /* ── Suggestions ── */
    #suggestions {
      position: absolute; top: calc(100% - 1px); left: 12px; right: 12px;
      background: #fff; border: 1.5px solid #e2e8f0;
      border-top: none; border-radius: 0 0 10px 10px;
      overflow: hidden; z-index: 1100;
      box-shadow: 0 8px 24px rgba(0,0,0,.1);
      display: none;
    }
    #suggestions.show { display: block; }
    .sug-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid #f7fafc;
      transition: background .1s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: #ebf8ff; }
    .sug-pin  { color: #4299e1; font-size: 14px; flex-shrink: 0; }
    .sug-name { font-size: 14px; color: #2d3748; flex: 1; font-weight: 500; }
    .sug-hint { font-size: 11px; color: #a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 38%; }
    .sug-none { padding: 14px; text-align: center; color: #a0aec0; font-size: 13px; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; min-height: 0; }
    #map { width: 100%; height: 100%; }

    /* ── Toast ── */
    #toast {
      position: absolute; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(255,255,255,.97);
      border: 1.5px solid #e2e8f0; border-radius: 20px;
      padding: 7px 18px; font-size: 13px; font-weight: 500; color: #2d3748;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
      pointer-events: none; white-space: nowrap;
      opacity: 0; transition: opacity .2s, transform .2s; z-index: 900;
    }
    #toast.show  { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error { color: #c53030; border-color: #feb2b2; background: rgba(255,245,245,.97); }

    /* ── Leaflet tweaks ── */
    .leaflet-control-zoom { border-radius: 10px !important; overflow: hidden; }
    .leaflet-control-zoom a {
      background: #fff !important; color: #4a5568 !important;
      border-color: #e2e8f0 !important;
    }
    .leaflet-control-zoom a:hover { background: #ebf8ff !important; color: #3182ce !important; }
    .leaflet-bar { border: 1.5px solid #e2e8f0 !important; box-shadow: 0 2px 8px rgba(0,0,0,.08) !important; }
    .leaflet-control-attribution {
      background: rgba(255,255,255,.7) !important;
      font-size: 9px !important; color: #a0aec0 !important;
    }
  </style>
</head>
<body>

<div id="search-bar">
  <div id="search-wrap">
    <span id="search-icon">📍</span>
    <input id="search-input" type="text" placeholder="Введите страну или город…"
      autocomplete="off" oninput="onInput(this.value)" onkeydown="onKey(event)">
    <button id="btn-search" onclick="doSearch()">Найти</button>
  </div>
  <div id="suggestions"></div>
</div>

<div id="map-wrap">
  <div id="map"></div>
  <div id="toast"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

/* ── Map ── */
const map = L.map('map', { center: [20, 20], zoom: 2, minZoom: 1, maxZoom: 18, zoomControl: true });

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19,
}).addTo(map);

/* ── Marker (no popup) ── */
const pinIcon = L.divIcon({
  className: '',
  html: `<svg width="28" height="36" viewBox="0 0 28 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.625 14 22 14 22s14-12.375 14-22C28 6.27 21.73 0 14 0z" fill="#4299e1"/>
    <circle cx="14" cy="14" r="6" fill="white"/>
  </svg>`,
  iconSize: [28, 36], iconAnchor: [14, 36],
});

let marker = null;
function placeMarker(lat, lon) {
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lon], { icon: pinIcon }).addTo(map);
}

/* ── Toast ── */
let toastTimer = null;
function showToast(msg, isError = false, ms = 3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  if (ms > 0) toastTimer = setTimeout(() => { el.className = ''; }, ms);
}

/* ── Suggestions ── */
let sugTimer = null, lastQ = '';
function onInput(val) {
  clearTimeout(sugTimer);
  if (!val.trim()) { hideSug(); return; }
  sugTimer = setTimeout(() => fetchSug(val.trim()), 350);
}
function onKey(e) {
  if (e.key === 'Enter')  { e.preventDefault(); hideSug(); doSearch(); }
  if (e.key === 'Escape') { hideSug(); }
}
async function fetchSug(q) {
  if (q === lastQ) return;
  lastQ = q;
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&accept-language=ru&limit=5`;
    const data = await fetch(url).then(r => r.json());
    renderSug(data);
  } catch { /* ignore */ }
}
function renderSug(items) {
  const box = document.getElementById('suggestions');
  if (!items.length) {
    box.innerHTML = '<div class="sug-none">Ничего не найдено</div>';
    box.classList.add('show'); return;
  }
  box.innerHTML = items.map(it => {
    const parts = it.display_name.split(',');
    const name = parts[0].trim();
    const hint = parts.slice(1, 3).join(',').trim();
    const lat = parseFloat(it.lat), lon = parseFloat(it.lon);
    return `<div class="sug-item" onclick="pickSug(${lat},${lon},'${name.replace(/'/g,"\\'")}')">
      <span class="sug-pin">📍</span>
      <span class="sug-name">${name}</span>
      <span class="sug-hint">${hint}</span>
    </div>`;
  }).join('');
  box.classList.add('show');
}
function hideSug() {
  const box = document.getElementById('suggestions');
  box.classList.remove('show'); box.innerHTML = ''; lastQ = '';
}
function pickSug(lat, lon, name) {
  hideSug();
  document.getElementById('search-input').value = name;
  flyTo(lat, lon, name);
}

/* ── Search ── */
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  hideSug();
  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  showToast('Поиск…', false, 0);
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&accept-language=ru&limit=1`;
    const data = await fetch(url).then(r => r.json());
    if (!data.length) { showToast('Место не найдено', true); }
    else { flyTo(parseFloat(data[0].lat), parseFloat(data[0].lon), data[0].display_name.split(',')[0].trim()); }
  } catch { showToast('Ошибка соединения', true); }
  finally { btn.disabled = false; }
}

function flyTo(lat, lon, name) {
  placeMarker(lat, lon);
  map.flyTo([lat, lon], 6, { duration: 1 });
  showToast('📍 ' + name);
}

/* ── Close suggestions on outside click ── */
document.addEventListener('click', e => {
  if (!document.getElementById('search-bar').contains(e.target)) hideSug();
});
map.on('click', hideSug);
</script>
</body>
</html>
