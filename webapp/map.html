  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden; background: #0d1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column;
    }

    /* ── Search bar ── */
    #search-bar {
      flex-shrink: 0;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 8px 10px;
      position: relative;
      z-index: 700;
    }
    #search-wrap {
      display: flex; align-items: center; gap: 8px;
      background: #21262d; border: 1px solid #30363d;
      border-radius: 8px; padding: 0 10px;
      transition: border-color .2s;
    }
    #search-wrap:focus-within { border-color: #58a6ff; }
    #search-icon { color: #8b949e; font-size: 14px; flex-shrink: 0; }
    #search-input {
      flex: 1; background: none; border: none; outline: none;
      color: #c9d1d9; font-size: 14px; padding: 9px 0;
    }
    #search-input::placeholder { color: #484f58; }
    #search-clear {
      background: none; border: none; color: #8b949e;
      font-size: 15px; cursor: pointer; padding: 0 2px;
      display: none; line-height: 1;
    }
    #search-clear.show { display: block; }
    #search-clear:hover { color: #c9d1d9; }

    /* ── Suggestions dropdown ── */
    #suggestions {
      position: absolute; top: 100%; left: 10px; right: 10px;
      background: #161b22; border: 1px solid #30363d;
      border-top: none; border-radius: 0 0 8px 8px;
      overflow: hidden; z-index: 800;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      display: none;
    }
    #suggestions.show { display: block; }
    .sug-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid #21262d;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover, .sug-item:active { background: #21262d; }
    .sug-flag { font-size: 18px; width: 24px; text-align: center; flex-shrink: 0; }
    .sug-name { font-size: 14px; color: #c9d1d9; }
    .sug-none { padding: 12px; text-align: center; color: #484f58; font-size: 13px; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; min-height: 0; }
    #map { width: 100%; height: 100%; }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0; background: #0d1117;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; z-index: 600;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #21262d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #8b949e; font-size: 14px; }

    /* ── Bottom sheet ── */
    #sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: #161b22; border-top: 1px solid #30363d;
      border-radius: 16px 16px 0 0;
      padding: 16px 16px 28px;
      box-shadow: 0 -8px 40px rgba(0,0,0,.6);
      z-index: 500;
      transform: translateY(110%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
    }
    #sheet.open { transform: translateY(0); }
    #sheet-close {
      position: absolute; top: 12px; right: 14px;
      background: #21262d; border: none; color: #8b949e;
      width: 28px; height: 28px; border-radius: 50%;
      font-size: 15px; cursor: pointer; line-height: 28px; text-align: center;
      transition: background .15s;
    }
    #sheet-close:hover { background: #30363d; }
    #sheet-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    #sheet-flag { font-size: 34px; line-height: 1; }
    #sheet-name { font-size: 18px; font-weight: 700; color: #f0f6fc; }
    .irow {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 9px 0; border-bottom: 1px solid #21262d;
    }
    .irow:last-child { border-bottom: none; }
    .iicon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; margin-top: 1px; }
    .ilabel { font-size: 11px; color: #8b949e; margin-bottom: 2px; text-transform: uppercase; letter-spacing: .4px; }
    .ival { font-size: 14px; color: #c9d1d9; }

    /* ── Leaflet dark ── */
    .leaflet-control-zoom a {
      background: #161b22 !important; color: #c9d1d9 !important; border-color: #30363d !important;
    }
    .leaflet-control-zoom a:hover { background: #21262d !important; }
    .leaflet-bar { border: 1px solid #30363d !important; }
    .leaflet-control-attribution {
      background: rgba(13,17,23,.8) !important; color: #484f58 !important; font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #6e7681 !important; }

/* Fallback coordinates for territories not present in GeoJSON */
const FALLBACK = {
  'Гонконг':       { center: [22.35, 114.17], zoom: 10 },
  'Макао':         { center: [22.20, 113.55], zoom: 12 },
  'Косово':        { center: [42.57, 20.90],  zoom: 7  },
  'Приднестровье': { center: [47.21, 29.46],  zoom: 8  },
};

/* GeoJSON name → info object */
const BY_EN = {};
DATA.forEach(([ru, flag, en, visa, time, budget]) => {
  if (en) BY_EN[en.toLowerCase()] = { ru, flag, visa, time, budget };
});

/* Russian name → info object */
const BY_RU = {};
DATA.forEach(([ru, flag, en, visa, time, budget]) => {
  BY_RU[ru] = { flag, visa, time, budget };
});

/* ── Leaflet map ── */
const map = L.map('map', { center: [20, 10], zoom: 2, minZoom: 1, maxZoom: 7 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CartoDB', subdomains: 'abcd', maxZoom: 19,
}).addTo(map);

const S = {
  def:   { fillColor: '#1f3a5f', fillOpacity: .55, color: '#2d5a8e', weight: .6 },
  hover: { fillColor: '#2d6aaf', fillOpacity: .78, color: '#4d9acf', weight: 1.1 },
  found: { fillColor: '#e3a008', fillOpacity: .85, color: '#f0c040', weight: 2.2 },
};

let geojson;
const layersByRu = {}; // ru_name → layer
let highlighted = null;

function getName(f) {
  return f.properties.name || f.properties.ADMIN || f.properties.NAME || '';
}

function onEach(feature, layer) {
  const raw = getName(feature);
  const info = BY_EN[raw.toLowerCase()] || null;
  if (info) layersByRu[info.ru] = layer;

  layer.on({
    mouseover(e) {
      if (highlighted !== e.target) e.target.setStyle(S.hover);
      L.DomEvent.stopPropagation(e);
    },
    mouseout(e) {
      if (highlighted !== e.target) geojson.resetStyle(e.target);
    },
    click(e) {
      L.DomEvent.stopPropagation(e);
      clearHighlight();
      showSheet(info, raw);
    },
  });
}

fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => {
    geojson = L.geoJSON(data, { style: S.def, onEachFeature: onEach }).addTo(map);
    document.getElementById('loading').style.display = 'none';
  })
  .catch(() => {
    document.getElementById('loading').innerHTML =
      '<p style="color:#da3633;text-align:center;padding:24px 20px">Не удалось загрузить карту.<br>Проверь интернет-соединение.</p>';
  });

/* ── Info sheet ── */
function showSheet(info, raw) {
  const name = info ? info.ru : (raw || '—');
  const flag = info ? info.flag : '🌍';
  document.getElementById('sheet-flag').textContent = flag;
  document.getElementById('sheet-name').textContent = name;

  if (info) {
    document.getElementById('sheet-body').innerHTML = `
      <div class="irow">
        <span class="iicon">🛂</span>
        <div><div class="ilabel">Виза для россиян</div><div class="ival">${info.visa}</div></div>
      </div>
      <div class="irow">
        <span class="iicon">📅</span>
        <div><div class="ilabel">Лучшее время</div><div class="ival">${info.time}</div></div>
      </div>
      <div class="irow">
        <span class="iicon">💰</span>
        <div><div class="ilabel">Средний бюджет</div><div class="ival">${info.budget}</div></div>
      </div>`;
  } else {
    document.getElementById('sheet-body').innerHTML =
      '<div class="irow"><span class="iicon">ℹ️</span><div><div class="ival" style="color:#8b949e">Подробная информация пока не добавлена</div></div></div>';
  }
  document.getElementById('sheet').classList.add('open');
}

function closeSheet() { document.getElementById('sheet').classList.remove('open'); }

/* ── Highlight helpers ── */
function clearHighlight() {
  if (highlighted) { geojson && geojson.resetStyle(highlighted); highlighted = null; }
}

function highlightLayer(layer) {
  clearHighlight();
  highlighted = layer;
  layer.setStyle(S.found);
  layer.bringToFront();
}

/* ── Search ── */
let searchTimer = null;

function onSearch(val) {
  document.getElementById('search-clear').classList.toggle('show', val.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => updateSuggestions(val.trim()), 120);
}

function updateSuggestions(q) {
  const box = document.getElementById('suggestions');
  if (!q) { box.classList.remove('show'); box.innerHTML = ''; return; }

  const ql = q.toLowerCase();
  const matches = DATA.filter(([ru]) => ru.toLowerCase().includes(ql)).slice(0, 7);

  if (!matches.length) {
    box.innerHTML = '<div class="sug-none">Ничего не найдено</div>';
    box.classList.add('show');
    return;
  }

  box.innerHTML = matches.map(([ru, flag]) =>
    `<div class="sug-item" onclick="selectCountry('${ru.replace(/'/g, "\\'")}')">
       <span class="sug-flag">${flag}</span>
       <span class="sug-name">${ru}</span>
     </div>`
  ).join('');
  box.classList.add('show');
}

function selectCountry(ru) {
  /* close dropdown + clear input */
  document.getElementById('suggestions').classList.remove('show');
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');

  const info = BY_RU[ru] || null;
  const layer = layersByRu[ru];

  if (layer) {
    highlightLayer(layer);
    map.flyToBounds(layer.getBounds(), { maxZoom: 6, padding: [50, 50], duration: 0.8 });
    showSheet(info, ru);
  } else if (FALLBACK[ru]) {
    const { center, zoom } = FALLBACK[ru];
    map.flyTo(center, zoom, { duration: 0.8 });
    showSheet(info, ru);
  } else {
    showSheet(info, ru);
  }
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('show');
  document.getElementById('suggestions').classList.remove('show');
  clearHighlight();
}

/* close dropdown on map click */
map.on('click', () => {
  document.getElementById('suggestions').classList.remove('show');
  closeSheet();
});

/* close dropdown when tapping outside */
document.addEventListener('click', e => {
  if (!document.getElementById('search-bar').contains(e.target)) {
    document.getElementById('suggestions').classList.remove('show');
  }
});
</script>
