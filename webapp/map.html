<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карта мира</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column; background: #f6f8fa;
    }

    /* ── Search bar ── */
    #search-bar {
      flex-shrink: 0;
      background: #fff;
      border-bottom: 1px solid #d0d7de;
      padding: 8px 10px;
      position: relative;
      z-index: 700;
    }
    #search-wrap {
      display: flex; align-items: center; gap: 6px;
    }
    #search-input {
      flex: 1;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      color: #24292f;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #search-input::placeholder { color: #8c959f; }
    #search-input:focus {
      border-color: #0969da;
      box-shadow: 0 0 0 3px rgba(9,105,218,.12);
      background: #fff;
    }
    #btn-search {
      flex-shrink: 0;
      background: #0969da;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    #btn-search:hover  { background: #0550ae; }
    #btn-search:active { background: #033d8b; }
    #btn-search:disabled { background: #8c959f; cursor: default; }

    /* ── Suggestions dropdown ── */
    #suggestions {
      position: absolute; top: 100%; left: 10px; right: 10px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-top: none;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      z-index: 800;
      box-shadow: 0 8px 24px rgba(140,149,159,.2);
      display: none;
    }
    #suggestions.show { display: block; }
    .sug-item {
      display: flex; align-items: baseline; gap: 8px;
      padding: 10px 12px; cursor: pointer;
      border-bottom: 1px solid #f6f8fa;
      transition: background .1s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover, .sug-item:active { background: #f6f8fa; }
    .sug-name { font-size: 14px; color: #24292f; flex: 1; }
    .sug-hint { font-size: 12px; color: #8c959f; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40%; }
    .sug-none { padding: 12px; text-align: center; color: #8c959f; font-size: 13px; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; min-height: 0; }
    #map { width: 100%; height: 100%; }

    /* ── Status toast ── */
    #status-msg {
      position: absolute;
      bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,.96);
      border: 1px solid #d0d7de;
      border-radius: 20px;
      padding: 7px 18px;
      font-size: 13px;
      color: #24292f;
      z-index: 600;
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(140,149,159,.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    #status-msg.show  { opacity: 1; }
    #status-msg.error { color: #d1242f; border-color: #d1242f; }

    /* ── Leaflet light overrides ── */
    .leaflet-control-zoom a {
      background: #fff !important; color: #24292f !important;
      border-color: #d0d7de !important;
    }
    .leaflet-control-zoom a:hover { background: #f6f8fa !important; }
    .leaflet-bar {
      border: 1px solid #d0d7de !important;
      box-shadow: 0 2px 8px rgba(140,149,159,.2) !important;
    }
    .leaflet-control-attribution {
      background: rgba(255,255,255,.8) !important;
      color: #8c959f !important;
      font-size: 9px !important;
    }
    .leaflet-control-attribution a { color: #0969da !important; }
    .leaflet-popup-content-wrapper {
      border-radius: 8px !important;
      box-shadow: 0 4px 16px rgba(140,149,159,.3) !important;
    }
  </style>
</head>
<body>

<!-- Search bar -->
<div id="search-bar">
  <div id="search-wrap">
    <input id="search-input" type="text" placeholder="🔍 Введите страну или город…"
      autocomplete="off" oninput="onInput(this.value)" onkeydown="onKey(event)">
    <button id="btn-search" onclick="doSearch()">Найти</button>
  </div>
  <div id="suggestions"></div>
</div>

<!-- Map -->
<div id="map-wrap">
  <div id="map"></div>
  <div id="status-msg"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

/* ── Map init ── */
const map = L.map('map', { center: [20, 10], zoom: 2, minZoom: 1, maxZoom: 18 });

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 19,
}).addTo(map);

let marker = null;

function placeMarker(lat, lon, label) {
  if (marker) map.removeLayer(marker);
  marker = L.marker([lat, lon]).addTo(map);
  if (label) marker.bindPopup(`<b>${label}</b>`).openPopup();
}

/* ── Status toast ── */
let statusTimer = null;
function showStatus(msg, isError = false, duration = 3000) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'show' + (isError ? ' error' : '');
  clearTimeout(statusTimer);
  if (duration > 0) statusTimer = setTimeout(() => { el.className = ''; }, duration);
}
function hideStatus() {
  clearTimeout(statusTimer);
  document.getElementById('status-msg').className = '';
}

/* ── Suggestions (Nominatim) ── */
let sugTimer = null;
let lastQ = '';

function onInput(val) {
  clearTimeout(sugTimer);
  if (!val.trim()) { hideSuggestions(); return; }
  sugTimer = setTimeout(() => loadSuggestions(val.trim()), 350);
}

function onKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); hideSuggestions(); doSearch(); }
  if (e.key === 'Escape') { hideSuggestions(); }
}

async function loadSuggestions(q) {
  if (q === lastQ) return;
  lastQ = q;
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=ru`;
    const data = await fetch(url).then(r => r.json());
    renderSuggestions(data);
  } catch { /* ignore */ }
}

function renderSuggestions(items) {
  const box = document.getElementById('suggestions');
  if (!items.length) {
    box.innerHTML = '<div class="sug-none">Ничего не найдено</div>';
    box.classList.add('show');
    return;
  }
  box.innerHTML = items.map(it => {
    const parts = it.display_name.split(',');
    const name = parts[0].trim();
    const hint = parts.slice(1, 3).join(',').trim();
    const lat = parseFloat(it.lat), lon = parseFloat(it.lon);
    const safeName = name.replace(/'/g, "\\'");
    return `<div class="sug-item" onclick="pickSuggestion(${lat},${lon},'${safeName}')">
      <span class="sug-name">${name}</span>
      <span class="sug-hint">${hint}</span>
    </div>`;
  }).join('');
  box.classList.add('show');
}

function hideSuggestions() {
  const box = document.getElementById('suggestions');
  box.classList.remove('show');
  box.innerHTML = '';
  lastQ = '';
}

function pickSuggestion(lat, lon, name) {
  hideSuggestions();
  document.getElementById('search-input').value = name;
  flyToAndMark(lat, lon, name);
}

/* ── Main search ── */
async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  hideSuggestions();

  const btn = document.getElementById('btn-search');
  btn.disabled = true;
  showStatus('Поиск…', false, 0);

  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=ru`;
    const data = await fetch(url).then(r => r.json());

    if (!data.length) {
      showStatus('Место не найдено', true, 3000);
    } else {
      const name = data[0].display_name.split(',')[0].trim();
      flyToAndMark(parseFloat(data[0].lat), parseFloat(data[0].lon), name);
      showStatus(`📍 ${name}`, false, 3000);
    }
  } catch {
    showStatus('Ошибка соединения', true, 3000);
  } finally {
    btn.disabled = false;
  }
}

function flyToAndMark(lat, lon, label) {
  placeMarker(lat, lon, label);
  map.flyTo([lat, lon], 5, { duration: 1 });
}

/* ── Close suggestions on outside click / map tap ── */
map.on('click', hideSuggestions);
document.addEventListener('click', e => {
  if (!document.getElementById('search-bar').contains(e.target)) hideSuggestions();
});
</script>
</body>
</html>
