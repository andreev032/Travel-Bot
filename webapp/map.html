<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Карта мира</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; flex-direction: column;
      background: #f0f4f8;
      color: #1a202c;
    }

    /* ── Search bar ── */
    #search-bar {
      flex-shrink: 0;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 12px;
      position: relative;
      z-index: 700;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
    }
    #search-wrap {
      display: flex; align-items: center; gap: 8px;
      position: relative;
    }
    #search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #a0aec0;
      font-size: 15px;
      pointer-events: none;
    }
    #search-input {
      flex: 1;
      background: #f7fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px 12px 10px 36px;
      font-size: 14px;
      color: #1a202c;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    #search-input::placeholder { color: #a0aec0; }
    #search-input:focus {
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66,153,225,.15);
      background: #fff;
    }
    #btn-search {
      flex-shrink: 0;
      background: linear-gradient(135deg, #4299e1, #3182ce);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      box-shadow: 0 2px 6px rgba(66,153,225,.4);
      white-space: nowrap;
    }
    #btn-search:hover  { opacity: .9; }
    #btn-search:active { transform: scale(.97); opacity: .85; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; min-height: 0; }
    #map-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

<!-- Search bar -->
<div id="search-bar">
  <div id="search-wrap">
    <span id="search-icon">📍</span>
    <input id="search-input" type="text" placeholder="Введите страну или город…"
      autocomplete="off" onkeydown="onKey(event)">
    <button id="btn-search" onclick="doSearch()">Найти</button>
  </div>
</div>

<!-- Google Maps iframe -->
<div id="map-wrap">
  <iframe id="map-frame"
    src="https://maps.google.com/maps?hl=ru&output=embed&z=2&ll=20,20"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

function onKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
}

function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const src = 'https://maps.google.com/maps?hl=ru&output=embed&q=' + encodeURIComponent(q);
  document.getElementById('map-frame').src = src;
}
</script>
</body>
</html>
